<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit Center</title>
    <style>
      :root { --bg:#f8fafc; --panel:#fff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0; --ok:#16a34a; --warn:#ea580c; --bad:#dc2626; }
      * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#eff6ff 0%,var(--bg) 260px); color:var(--text); }
      .wrap { max-width:1240px; margin:0 auto; padding:32px 20px 64px; } .nav { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:24px; }
      .nav a { color:var(--muted); text-decoration:none; } .nav a.active,.nav a:hover { color:var(--text); }
      h1 { margin:0 0 10px; font-size:clamp(34px,5vw,54px); } .sub { color:var(--muted); max-width:760px; margin-bottom:22px; }
      .table { display:grid; gap:12px; } .row { display:grid; grid-template-columns:2fr repeat(3, 160px) 140px; gap:12px; align-items:center; padding:16px; border-radius:18px; background:var(--panel); border:1px solid var(--line); }
      .row.header { background:transparent; border:0; padding:0 16px; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
      .pill { display:inline-flex; align-items:center; justify-content:center; padding:8px 10px; border-radius:999px; font-size:12px; font-weight:700; }
      .approved,.clean,.passed { background:#dcfce7; color:var(--ok); } .issues_detected { background:#ffedd5; color:var(--warn); } .blocked,.rejected { background:#fee2e2; color:var(--bad); }
      .muted { color:var(--muted); font-size:13px; }
      @media (max-width: 980px) { .row { grid-template-columns:1fr; } .row.header { display:none; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a href="/">Catalog</a><a href="/leaderboard">Leaderboard</a><a class="active" href="/audits">Audits</a><a href="/categories">Categories</a></nav>
      <h1>Audit Center</h1>
      <div class="sub">Internal review evidence for published skills, grouped into Review Status, Static Scan, and Sandbox results.</div>
      <div class="table" id="table">
        <div class="row header"><div>Skill</div><div>Review Status</div><div>Static Scan</div><div>Sandbox</div><div>Risk</div></div>
      </div>
    </div>
    <script>
      const table = document.getElementById('table');
      const esc = (value) => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      fetch('/api/v1/catalog/audits').then((res) => res.json()).then((payload) => {
        table.insertAdjacentHTML('beforeend', (payload.items || []).map((item) => `
          <div class="row">
            <div><strong><a href="/skills/${encodeURIComponent(item.skill_id)}" style="color:inherit;text-decoration:none;">${esc(item.title)}</a></strong><div class="muted">${esc(item.version)} · ${esc(item.reviewer)} · ${esc(item.category)}</div></div>
            <div><span class="pill ${esc(item.review_status)}">${esc(item.review_status)}</span></div>
            <div><span class="pill ${esc(item.static_scan_status)}">${esc(item.static_scan_status)}</span></div>
            <div><span class="pill ${esc(item.sandbox_status)}">${esc(item.sandbox_status)}</span></div>
            <div>${esc(item.risk_level)}</div>
          </div>`).join(''));
      });
    </script>
  </body>
</html>
