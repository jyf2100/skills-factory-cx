<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>审计中心</title>
    <link rel="stylesheet" href="/assets/theme.css" />
    <style>
      .row { grid-template-columns: 2fr repeat(3, 160px) 140px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a href="/">目录</a><a href="/leaderboard">排行榜</a><a class="active" href="/audits">审计</a><a href="/categories">分类</a></nav>
      <section class="hero">
        <div class="eyebrow">内部审计</div>
        <h1>审计中心</h1>
        <div class="sub">集中查看已发布技能的审核状态、静态扫描结果与沙箱执行结论。</div>
      </section>
      <div class="table" id="table">
        <div class="row header"><div>技能</div><div>审核状态</div><div>静态扫描</div><div>沙箱</div><div>风险</div></div>
      </div>
    </div>
    <script>
      const table = document.getElementById('table');
      const esc = (value) => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      const reviewLabel = { approved: '已通过', rejected: '已拒绝' };
      const scanLabel = { clean: '干净', issues_detected: '发现问题' };
      const sandboxLabel = { passed: '通过', blocked: '阻断' };
      const riskLabel = { low: '低', medium: '中', high: '高', critical: '严重' };
      fetch('/api/v1/catalog/audits').then((res) => res.json()).then((payload) => {
        table.insertAdjacentHTML('beforeend', (payload.items || []).map((item) => `
          <div class="row">
            <div><strong><a href="/audits/${encodeURIComponent(item.skill_id)}" style="text-decoration:none;">${esc(item.title)}</a></strong><div class="meta"><span>版本 ${esc(item.version)}</span><span>${esc(item.reviewer)}</span><span>${esc(item.category)}</span></div></div>
            <div><span class="pill ${esc(item.review_status)}">${esc(reviewLabel[item.review_status] || item.review_status)}</span></div>
            <div><span class="pill ${esc(item.static_scan_status)}">${esc(scanLabel[item.static_scan_status] || item.static_scan_status)}</span></div>
            <div><span class="pill ${esc(item.sandbox_status)}">${esc(sandboxLabel[item.sandbox_status] || item.sandbox_status)}</span></div>
            <div>${esc(riskLabel[item.risk_level] || item.risk_level)}</div>
          </div>`).join('') || '<div class="card empty">暂无审计数据。</div>');
      }).catch(() => {
        table.insertAdjacentHTML('beforeend', '<div class="card empty">加载审计数据失败。</div>');
      });
    </script>
  </body>
</html>
