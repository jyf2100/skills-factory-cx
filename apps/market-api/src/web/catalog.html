<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>技能目录</title>
    <link rel="stylesheet" href="/assets/theme.css" />
    <style>
      .toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      .toolbar input { flex: 1; min-width: 260px; }
      .stats { display: grid; gap: 16px; grid-template-columns: repeat(4, minmax(0, 1fr)); margin: 24px 0; }
      .stat-value { font-size: 28px; font-weight: 800; }
      .stat-label { color: var(--muted); }
      .skill h3 { margin: 0; font-size: 20px; }
      .grid-main { display: grid; gap: 16px; grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr); }
      .audit-list { display: grid; gap: 12px; }
      .audit { padding: 14px; border-radius: 16px; border: 1px solid var(--line); background: rgba(15, 23, 42, 0.72); }
      @media (max-width: 980px) { .stats, .grid-main { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a class="active" href="/">目录</a><a href="/leaderboard">排行榜</a><a href="/audits">审计</a><a href="/categories">分类</a></nav>
      <section class="hero">
        <div class="eyebrow">内部技能市场</div>
        <h1>技能目录</h1>
        <div class="sub">面向内部团队的技能目录，数据直接来自本地 GitLab 发布仓库，并联动审计与分类视图。</div>
        <div class="toolbar">
          <input id="search" type="search" placeholder="搜索技能" />
          <button id="refresh" class="button primary">刷新目录</button>
        </div>
      </section>

      <section class="stats" id="stats">
        <div class="card"><div class="stat-value" id="stat-skills">0</div><div class="stat-label">已发布技能</div></div>
        <div class="card"><div class="stat-value" id="stat-versions">0</div><div class="stat-label">跟踪版本</div></div>
        <div class="card"><div class="stat-value" id="stat-reviewed">0</div><div class="stat-label">已审版本</div></div>
        <div class="card"><div class="stat-value" id="stat-scans">0</div><div class="stat-label">扫描告警</div></div>
      </section>

      <section class="grid-main">
        <div class="card">
          <div class="section-title"><h2>最新发布</h2><a href="/leaderboard" class="meta">查看排行榜 →</a></div>
          <div id="skills" class="list"></div>
        </div>

        <div class="list">
          <div class="card">
            <div class="section-title"><h2>最新审计</h2><a href="/audits" class="meta">进入审计中心 →</a></div>
            <div id="audits" class="audit-list"></div>
          </div>
          <div class="card">
            <div class="section-title"><h2>分类</h2><a href="/categories" class="meta">查看全部分类 →</a></div>
            <div id="categories" class="list"></div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const esc = (value) => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      const riskLabel = { low: '低风险', medium: '中风险', high: '高风险', critical: '严重风险' };
      const reviewLabel = { approved: '已通过', rejected: '已拒绝' };
      const scanLabel = { clean: '干净', issues_detected: '发现问题' };
      const sandboxLabel = { passed: '通过', blocked: '阻断' };
      const searchInput = document.getElementById('search');
      const refreshButton = document.getElementById('refresh');
      const skillsEl = document.getElementById('skills');
      const auditsEl = document.getElementById('audits');
      const categoriesEl = document.getElementById('categories');

      function renderSkills(items) {
        skillsEl.innerHTML = items.map((item) => `
          <a class="item skill" href="/skills/${encodeURIComponent(item.skill_id)}">
            <div class="meta"><span>${esc(item.category)}</span><span>${esc(item.reviewer)}</span><span>版本 ${esc(item.latest_version)}</span></div>
            <h3>${esc(item.title)}</h3>
            <div class="sub">${esc(item.summary)}</div>
            <div class="meta"><span class="pill ${esc(item.risk_level)}">${esc(riskLabel[item.risk_level] || item.risk_level)}</span><span>${esc((item.tags || []).join(' / ') || '无标签')}</span></div>
          </a>`).join('') || '<div class="empty">暂无技能。</div>';
      }

      function renderAudits(items) {
        auditsEl.innerHTML = items.map((item) => `
          <a class="audit" href="/audits/${encodeURIComponent(item.skill_id)}" style="text-decoration:none;display:grid;gap:8px;">
            <strong>${esc(item.title)}</strong>
            <div class="meta"><span>版本 ${esc(item.version)}</span><span>${esc(item.reviewer)}</span><span>${esc(item.category)}</span></div>
            <div class="meta"><span class="pill ${esc(item.review_status)}">${esc(reviewLabel[item.review_status] || item.review_status)}</span><span class="pill ${esc(item.static_scan_status)}">${esc(scanLabel[item.static_scan_status] || item.static_scan_status)}</span><span class="pill ${esc(item.sandbox_status)}">${esc(sandboxLabel[item.sandbox_status] || item.sandbox_status)}</span></div>
          </a>`).join('') || '<div class="empty">暂无审计记录。</div>';
      }

      function renderCategories(items) {
        categoriesEl.innerHTML = items.slice(0, 4).map((item) => `
          <a class="item" href="/categories/${encodeURIComponent(item.slug)}" style="text-decoration:none;">
            <strong>${esc(item.label)}</strong>
            <div class="meta"><span>${esc(String(item.skills_count))} 个技能</span><span>最近发布 ${esc(new Date(item.latest_published_at).toLocaleDateString())}</span></div>
          </a>`).join('') || '<div class="empty">暂无分类。</div>';
      }

      function updateStats(skills, audits) {
        document.getElementById('stat-skills').textContent = String(skills.length);
        document.getElementById('stat-versions').textContent = String(skills.reduce((total, item) => total + item.versions_count, 0));
        document.getElementById('stat-reviewed').textContent = String(audits.length);
        document.getElementById('stat-scans').textContent = String(audits.reduce((total, item) => total + item.scan_issue_count, 0));
      }

      async function loadCatalog() {
        const query = searchInput.value.trim();
        const suffix = query ? `?query=${encodeURIComponent(query)}` : '';
        const [skillsPayload, auditsPayload, categoriesPayload] = await Promise.all([
          fetch(`/api/v1/catalog/skills${suffix}`).then((res) => res.json()),
          fetch('/api/v1/catalog/audits?limit=6').then((res) => res.json()),
          fetch('/api/v1/catalog/categories').then((res) => res.json())
        ]);
        const skills = skillsPayload.items || [];
        const audits = auditsPayload.items || [];
        const categories = categoriesPayload.items || [];
        renderSkills(skills);
        renderAudits(audits);
        renderCategories(categories);
        updateStats(skills, audits);
      }

      searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') loadCatalog();
      });
      refreshButton.addEventListener('click', loadCatalog);
      loadCatalog().catch(() => {
        skillsEl.innerHTML = '<div class="empty">加载目录失败。</div>';
        auditsEl.innerHTML = '<div class="empty">加载审计失败。</div>';
        categoriesEl.innerHTML = '<div class="empty">加载分类失败。</div>';
      });
    </script>
  </body>
</html>
