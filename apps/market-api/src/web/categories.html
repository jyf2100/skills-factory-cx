<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse by Category</title>
    <style>
      :root { --bg:#f8fafc; --panel:#fff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0; --brand:#2563eb; --brand2:#7c3aed; }
      * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#eef2ff 0%,var(--bg) 240px); color:var(--text); }
      .wrap { max-width:1180px; margin:0 auto; padding:32px 20px 64px; } .nav { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:24px; }
      .nav a { color:var(--muted); text-decoration:none; } .nav a.active,.nav a:hover { color:var(--text); }
      h1 { margin:0 0 10px; font-size:clamp(34px,5vw,54px); } .sub { color:var(--muted); max-width:760px; margin-bottom:22px; }
      .grid { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:16px; margin-bottom:24px; } .card,.detail { background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:20px; }
      .card button { border:0; background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; border-radius:12px; padding:10px 12px; cursor:pointer; }
      .list { display:grid; gap:12px; } .item { padding:14px; border-radius:16px; border:1px solid var(--line); }
      @media (max-width: 980px) { .grid { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a href="/">Catalog</a><a href="/leaderboard">Leaderboard</a><a href="/audits">Audits</a><a class="active" href="/categories">Categories</a></nav>
      <h1>Browse by Category</h1>
      <div class="sub">Explore the internal catalog through frontmatter-derived categories and skill families.</div>
      <section>
        <h2>Featured Categories</h2>
        <div id="categories" class="grid"></div>
      </section>
      <section class="detail">
        <h2 id="detail-title">Category Skills</h2>
        <div id="detail-list" class="list"></div>
      </section>
    </div>
    <script>
      const categoriesEl = document.getElementById('categories');
      const detailTitle = document.getElementById('detail-title');
      const detailList = document.getElementById('detail-list');
      const esc = (value) => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      async function loadCategory(slug, label) {
        const payload = await fetch(`/api/v1/catalog/categories/${encodeURIComponent(slug)}`).then((res) => res.json());
        detailTitle.textContent = `Category Skills · ${label}`;
        detailList.innerHTML = (payload.items || []).map((item) => `<div class="item"><strong><a href="/skills/${encodeURIComponent(item.skill_id)}" style="color:inherit;text-decoration:none;">${esc(item.title)}</a></strong><div>${esc(item.summary)}</div><div style="color:#64748b;font-size:13px;">${esc(item.latest_version)} · ${esc(item.reviewer)}</div></div>`).join('');
      }
      fetch('/api/v1/catalog/categories').then((res) => res.json()).then((payload) => {
        const items = payload.items || [];
        categoriesEl.innerHTML = items.map((item) => `<div class="card"><h3>${esc(item.label)}</h3><div style="color:#64748b;margin-bottom:12px;">${esc(String(item.skills_count))} skills</div><button data-slug="${esc(item.slug)}" data-label="${esc(item.label)}">Open Category</button></div>`).join('');
        categoriesEl.querySelectorAll('button').forEach((button) => button.addEventListener('click', () => loadCategory(button.dataset.slug, button.dataset.label)));
        if (items[0]) loadCategory(items[0].slug, items[0].label);
      });
    </script>
  </body>
</html>
