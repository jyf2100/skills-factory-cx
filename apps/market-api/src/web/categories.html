<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>按分类浏览</title>
    <link rel="stylesheet" href="/assets/theme.css" />
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a href="/">目录</a><a href="/leaderboard">排行榜</a><a href="/audits">审计</a><a class="active" href="/categories">分类</a></nav>
      <section class="hero">
        <div class="eyebrow">分类导航</div>
        <h1>按分类浏览</h1>
        <div class="sub">通过 frontmatter 派生的分类与标签，快速切换到不同技能家族与独立详情页。</div>
      </section>
      <section>
        <div class="section-title"><h2>重点分类</h2><span class="meta">点击进入独立分类详情页</span></div>
        <div id="categories" class="grid-three"></div>
      </section>
      <section class="card" style="margin-top:16px;">
        <h2>分类技能</h2>
        <div class="empty">打开任意分类，即可查看筛选、排序与相关标签。</div>
      </section>
    </div>
    <script>
      const categoriesEl = document.getElementById('categories');
      const esc = (value) => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      fetch('/api/v1/catalog/categories').then((res) => res.json()).then((payload) => {
        const items = payload.items || [];
        categoriesEl.innerHTML = items.map((item) => `
          <a class="card" href="/categories/${encodeURIComponent(item.slug)}" style="text-decoration:none;display:grid;gap:12px;">
            <h3>${esc(item.label)}</h3>
            <div class="sub">${esc(String(item.skills_count))} 个技能</div>
            <div class="meta"><span>最近发布 ${esc(new Date(item.latest_published_at).toLocaleDateString())}</span></div>
            <span class="button primary" style="width:max-content;">查看分类</span>
          </a>`).join('') || '<div class="card empty">暂无分类数据。</div>';
      }).catch(() => {
        categoriesEl.innerHTML = '<div class="card empty">加载分类失败。</div>';
      });
    </script>
  </body>
</html>
