<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分类概览</title>
    <link rel="stylesheet" href="/assets/theme.css" />
    <style>
      .filters { display:grid; grid-template-columns:1.4fr repeat(3, minmax(0,1fr)); gap:12px; margin:16px 0 20px; }
      .actions { display:flex; gap:10px; justify-content:flex-end; }
      @media (max-width:980px) { .filters { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a href="/">目录</a><a href="/leaderboard">排行榜</a><a href="/audits">审计</a><a class="active" href="/categories">分类</a></nav>
      <section class="hero">
        <div class="eyebrow">分类详情</div>
        <h1 id="title">分类概览</h1>
        <p id="summary" class="sub">正在加载分类详情…</p>
      </section>

      <section class="card">
        <h2>筛选技能</h2>
        <form id="filters-form">
          <div class="filters">
            <label>关键词
              <input id="q" name="q" type="search" placeholder="搜索标题、标签和描述" />
            </label>
            <label>排序方式
              <select id="sort" name="sort">
                <option value="latest">最新发布</option>
                <option value="title">按标题</option>
                <option value="risk">按风险</option>
              </select>
            </label>
            <label>风险级别
              <select id="risk" name="risk">
                <option value="">全部</option>
                <option value="low">低</option>
                <option value="medium">中</option>
                <option value="high">高</option>
                <option value="critical">严重</option>
              </select>
            </label>
            <label>标签
              <select id="tag" name="tag">
                <option value="">全部标签</option>
              </select>
            </label>
          </div>
          <div class="actions">
            <button type="button" id="reset" class="secondary">重置</button>
            <button type="submit" class="primary">应用</button>
          </div>
        </form>
      </section>

      <div class="grid-two" style="margin-top:16px;">
        <section class="card"><h2>分类技能</h2><div id="skills" class="list"></div></section>
        <aside class="card"><h2>相关标签</h2><div id="tags" class="meta"></div></aside>
      </div>
    </div>
    <script>
      const slug = decodeURIComponent(location.pathname.split('/').pop());
      const form = document.getElementById('filters-form');
      const qInput = document.getElementById('q');
      const sortInput = document.getElementById('sort');
      const riskInput = document.getElementById('risk');
      const tagInput = document.getElementById('tag');
      const resetButton = document.getElementById('reset');
      const riskLabel = { low: '低风险', medium: '中风险', high: '高风险', critical: '严重风险' };
      const esc = (value) => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');

      function currentParams() {
        const params = new URLSearchParams(location.search);
        return { sort: params.get('sort') || 'latest', q: params.get('q') || '', risk: params.get('risk') || '', tag: params.get('tag') || '' };
      }
      function syncForm(values) { qInput.value = values.q; sortInput.value = values.sort; riskInput.value = values.risk; }
      function renderTagOptions(tags, selected) {
        tagInput.innerHTML = ['<option value="">全部标签</option>'].concat(tags.map((tag) => `<option value="${esc(tag)}">${esc(tag)}</option>`)).join('');
        tagInput.value = selected || '';
      }
      async function loadCategory() {
        const values = currentParams();
        syncForm(values);
        const params = new URLSearchParams();
        if (values.sort && values.sort !== 'latest') params.set('sort', values.sort);
        if (values.q) params.set('q', values.q);
        if (values.risk) params.set('risk', values.risk);
        if (values.tag) params.set('tag', values.tag);
        const suffix = params.toString() ? `?${params.toString()}` : '';
        const response = await fetch(`/api/v1/catalog/categories/${encodeURIComponent(slug)}${suffix}`);
        const payload = await response.json();
        document.getElementById('title').textContent = `分类概览 · ${payload.label}`;
        document.getElementById('summary').textContent = `当前共有 ${payload.items.length} 个技能符合此分类视图。`;
        renderTagOptions(payload.available_tags || [], payload.filters?.tag || values.tag);
        document.getElementById('skills').innerHTML = (payload.items || []).map((item) => `<div class="item"><strong><a href="/skills/${encodeURIComponent(item.skill_id)}" style="text-decoration:none;">${esc(item.title)}</a></strong><div class="sub">${esc(item.summary)}</div><div class="meta"><span>${esc(riskLabel[item.risk_level] || item.risk_level)}</span><span>版本 ${esc(item.latest_version)}</span><span>${esc(item.tags.join(' / ') || '无标签')}</span></div></div>`).join('') || '<div class="item empty">当前筛选条件下没有技能。</div>';
        const tags = payload.available_tags?.length ? payload.available_tags : [...new Set((payload.items || []).flatMap((item) => item.tags || []))];
        document.getElementById('tags').innerHTML = tags.map((tag) => `<button type="button" class="tag secondary" data-tag="${esc(tag)}">${esc(tag)}</button>`).join('') || '<span class="empty">暂无标签</span>';
      }
      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const params = new URLSearchParams();
        if (sortInput.value && sortInput.value !== 'latest') params.set('sort', sortInput.value);
        if (qInput.value.trim()) params.set('q', qInput.value.trim());
        if (riskInput.value) params.set('risk', riskInput.value);
        if (tagInput.value) params.set('tag', tagInput.value);
        const suffix = params.toString() ? `?${params.toString()}` : '';
        history.replaceState(null, '', `${location.pathname}${suffix}`);
        loadCategory();
      });
      resetButton.addEventListener('click', () => { history.replaceState(null, '', location.pathname); loadCategory(); });
      document.getElementById('tags').addEventListener('click', (event) => {
        const button = event.target.closest('[data-tag]');
        if (!button) return;
        tagInput.value = button.getAttribute('data-tag') || '';
        form.requestSubmit();
      });
      loadCategory().catch((error) => { document.getElementById('summary').textContent = `加载分类详情失败：${String(error)}`; });
    </script>
  </body>
</html>
