<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category Overview</title>
    <style>
      :root { --bg:#f8fafc; --panel:#fff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0; }
      * { box-sizing:border-box; } body { margin:0; font-family:Inter,system-ui,sans-serif; background:linear-gradient(180deg,#eef2ff 0%,var(--bg) 240px); color:var(--text); }
      .wrap { max-width:1180px; margin:0 auto; padding:32px 20px 64px; } .nav { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:24px; }
      .nav a { color:var(--muted); text-decoration:none; } .nav a.active,.nav a:hover { color:var(--text); }
      .grid { display:grid; grid-template-columns:minmax(0,2fr) minmax(280px,1fr); gap:16px; }
      .card { background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:20px; } .list { display:grid; gap:12px; } .item { padding:14px; border-radius:16px; border:1px solid var(--line); }
      .tags { display:flex; gap:8px; flex-wrap:wrap; } .tag { padding:6px 10px; border-radius:999px; background:#eef2ff; color:#4338ca; font-size:12px; }
      @media (max-width:980px) { .grid { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a href="/">Catalog</a><a href="/leaderboard">Leaderboard</a><a href="/audits">Audits</a><a class="active" href="/categories">Categories</a></nav>
      <h1 id="title">Category Overview</h1>
      <p id="summary" style="color:#64748b;max-width:760px;">Loading category details…</p>
      <div class="grid">
        <section class="card"><h2>Category Skills</h2><div id="skills" class="list"></div></section>
        <aside class="card"><h2>Related Tags</h2><div id="tags" class="tags"></div></aside>
      </div>
    </div>
    <script>
      const slug = decodeURIComponent(location.pathname.split('/').pop());
      const esc = (value) => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      fetch(`/api/v1/catalog/categories/${encodeURIComponent(slug)}`).then((res) => res.json()).then((payload) => {
        document.getElementById('title').textContent = `Category Overview · ${payload.label}`;
        document.getElementById('summary').textContent = `${payload.items.length} skills currently mapped to this internal category.`;
        document.getElementById('skills').innerHTML = (payload.items || []).map((item) => `<div class="item"><strong><a href="/skills/${encodeURIComponent(item.skill_id)}" style="color:inherit;text-decoration:none;">${esc(item.title)}</a></strong><div>${esc(item.summary)}</div></div>`).join('');
        const tags = [...new Set((payload.items || []).flatMap((item) => item.tags || []))];
        document.getElementById('tags').innerHTML = tags.map((tag) => `<span class="tag">${esc(tag)}</span>`).join('') || '<span style="color:#64748b;">No tags</span>';
      });
    </script>
  </body>
</html>
