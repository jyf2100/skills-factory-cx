<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>技能排行榜</title>
    <link rel="stylesheet" href="/assets/theme.css" />
    <style>
      .item { grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; }
      .rank { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 16px; background: linear-gradient(135deg, var(--brand), var(--brand-2)); font-weight: 800; }
      .score { text-align: right; }
      .score strong { display: block; font-size: 26px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a href="/">目录</a><a class="active" href="/leaderboard">排行榜</a><a href="/audits">审计</a><a href="/categories">分类</a></nav>
      <section class="hero">
        <div class="eyebrow">内部榜单</div>
        <h1>技能排行榜</h1>
        <div class="sub">完全基于本地 GitLab 发布深度、最近活跃度与风险姿态生成的内部排行榜。</div>
      </section>
      <section class="tabs">
        <button class="tab active" data-mode="all_time">总榜</button>
        <button class="tab" data-mode="trending">趋势</button>
        <button class="tab" data-mode="hot">热门</button>
      </section>
      <section id="list" class="list"></section>
    </div>
    <script>
      const tabs = [...document.querySelectorAll('.tab')];
      const list = document.getElementById('list');
      const esc = (value) => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      const modeLabel = { all_time: '总榜', trending: '趋势', hot: '热门' };
      const riskLabel = { low: '低风险', medium: '中风险', high: '高风险', critical: '严重风险' };
      let payload = null;
      function render(mode) {
        const items = (payload && payload[mode]) || [];
        list.innerHTML = items.map((item) => `
          <div class="item card">
            <div class="rank">#${item.rank}</div>
            <div>
              <div class="meta"><span>${esc(item.category)}</span><span>${esc(item.reviewer)}</span><span>版本 ${esc(item.latest_version)}</span><span>${esc(riskLabel[item.risk_level] || item.risk_level)}</span></div>
              <h3 style="margin:6px 0 4px;"><a href="/skills/${encodeURIComponent(item.skill_id)}" style="text-decoration:none;">${esc(item.title)}</a></h3>
              <div class="sub">${esc(item.summary)}</div>
            </div>
            <div class="score"><strong>${esc(item.score)}</strong><span class="meta">${esc(modeLabel[mode] || item.score_label)}</span></div>
          </div>`).join('') || '<div class="card empty">暂无榜单数据。</div>';
      }
      async function load() {
        payload = await fetch('/api/v1/catalog/leaderboard').then((res) => res.json());
        render('all_time');
      }
      tabs.forEach((tab) => tab.addEventListener('click', () => {
        tabs.forEach((item) => item.classList.remove('active'));
        tab.classList.add('active');
        render(tab.dataset.mode);
      }));
      load().catch(() => { list.innerHTML = '<div class="card empty">加载排行榜失败。</div>'; });
    </script>
  </body>
</html>
