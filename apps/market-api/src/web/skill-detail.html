<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>技能概览</title>
    <link rel="stylesheet" href="/assets/theme.css" />
    <style>
      .markdown { line-height: 1.7; color: #dbeafe; }
      .markdown h1, .markdown h2, .markdown h3 { color: #ffffff; margin-top: 0; }
      .markdown p, .markdown ul { margin: 0 0 14px; }
      .markdown code { padding: 0.15rem 0.45rem; border-radius: 8px; background: rgba(15, 23, 42, 0.95); color: #bae6fd; }
      .markdown pre { margin-bottom: 14px; }
      .markdown pre code { display: block; padding: 0; background: transparent; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav"><a href="/">目录</a><a href="/leaderboard">排行榜</a><a href="/audits">审计</a><a href="/categories">分类</a></nav>
      <section class="hero">
        <div class="eyebrow">技能详情</div>
        <h1 id="title">技能概览</h1>
        <div id="summary" class="sub">正在从本地 GitLab 加载技能详情…</div>
      </section>

      <section class="grid-two">
        <div class="card">
          <h2>技能概览</h2>
          <div id="overview" class="meta"></div>
          <h2 style="margin-top:20px;">技能内容</h2>
          <article id="readme-html" class="markdown">加载中…</article>
        </div>

        <div class="card" style="display:grid; gap:16px; align-content:start;">
          <div>
            <h2>安装命令</h2>
            <pre id="install-command">加载中…</pre>
          </div>
          <div>
            <h2>审计证据</h2>
            <div id="audit-evidence" class="list"></div>
          </div>
        </div>
      </section>

      <section class="card" style="margin-top:16px;">
        <h2>版本历史</h2>
        <div id="versions" class="list"></div>
      </section>
    </div>

    <script>
      const skillId = decodeURIComponent(window.location.pathname.split('/').pop());
      const titleEl = document.getElementById('title');
      const summaryEl = document.getElementById('summary');
      const overviewEl = document.getElementById('overview');
      const readmeEl = document.getElementById('readme-html');
      const installCommandEl = document.getElementById('install-command');
      const versionsEl = document.getElementById('versions');
      const auditEvidenceEl = document.getElementById('audit-evidence');
      const esc = (value) => String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
      const riskLabel = { low: '低风险', medium: '中风险', high: '高风险', critical: '严重风险' };
      const formatDate = (value) => new Date(value).toLocaleString('zh-CN');

      async function loadDetail() {
        const response = await fetch(`/api/v1/catalog/skills/${encodeURIComponent(skillId)}`);
        const payload = await response.json();
        titleEl.textContent = payload.title;
        summaryEl.textContent = payload.summary;
        overviewEl.innerHTML = [
          `<span>${esc(payload.category || '未分类')}</span>`,
          `<span>${esc(riskLabel[payload.risk_level] || payload.risk_level)}</span>`,
          `<span>当前版本 ${esc(payload.latest_version)}</span>`,
          `<span>${esc(formatDate(payload.published_at))}</span>`
        ].join('');
        readmeEl.innerHTML = payload.readme_html || '<p>暂无技能内容。</p>';
        installCommandEl.textContent = payload.install_command;
        versionsEl.innerHTML = payload.versions.map((version) => `
          <div class="item">
            <strong>${esc(version.version)}</strong>
            <div class="meta">
              <span>${esc(riskLabel[version.risk_level] || version.risk_level)}</span>
              <span>${esc(version.reviewer)}</span>
              <span>${esc(formatDate(version.published_at))}</span>
            </div>
            <div class="meta">
              <span>${esc(version.source_url)}</span>
              <span>${esc(version.package_url)}</span>
            </div>
          </div>`).join('') || '<div class="empty">暂无版本信息。</div>';
        auditEvidenceEl.innerHTML = payload.versions.map((version) => `
          <div class="item">
            <strong>${esc(version.version)}</strong>
            <div class="meta">
              <span>${esc(version.reviewer)}</span>
              <span>${esc(version.note || '已通过')}</span>
              <span>${esc(String(version.scan_issue_count))} 个扫描问题</span>
            </div>
          </div>`).join('') || '<div class="empty">暂无审计证据。</div>';
      }

      loadDetail().catch((error) => {
        summaryEl.textContent = `加载技能详情失败：${String(error)}`;
      });
    </script>
  </body>
</html>
