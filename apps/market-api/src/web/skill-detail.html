<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Overview</title>
    <style>
      :root { --bg: #0b1120; --panel: #111827; --panel-2: #172554; --text: #e5e7eb; --muted: #94a3b8; --line: rgba(148,163,184,0.2); --brand: #38bdf8; --brand-2: #818cf8; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: radial-gradient(circle at top, rgba(56,189,248,0.12), transparent 30%), var(--bg); color: var(--text); }
      .wrap { max-width: 1120px; margin: 0 auto; padding: 32px 20px 64px; }
      .back { color: var(--brand); text-decoration: none; }
      .hero { display: grid; gap: 12px; margin: 20px 0 26px; }
      h1 { margin: 0; font-size: clamp(34px, 5vw, 52px); }
      .sub { color: var(--muted); max-width: 760px; }
      .grid { display: grid; gap: 16px; grid-template-columns: minmax(0, 1.7fr) minmax(300px, 0.9fr); }
      .card { background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(17,24,39,0.88)); border: 1px solid var(--line); border-radius: 20px; padding: 20px; }
      .label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
      .command, pre { margin: 0; padding: 14px; border-radius: 14px; background: rgba(2, 6, 23, 0.6); overflow: auto; }
      .version-list, .audit-list { display: grid; gap: 12px; }
      .version, .audit { padding: 14px; border-radius: 16px; border: 1px solid var(--line); background: rgba(15, 23, 42, 0.8); }
      .meta { display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); font-size: 13px; }
      .markdown { line-height: 1.7; color: #dbeafe; }
      .markdown h1, .markdown h2, .markdown h3 { color: #ffffff; margin-top: 0; }
      .markdown p, .markdown ul { margin: 0 0 14px; }
      .markdown code { padding: 0.15rem 0.45rem; border-radius: 8px; background: rgba(15, 23, 42, 0.95); color: #bae6fd; }
      .markdown pre { margin-bottom: 14px; }
      .markdown pre code { display: block; padding: 0; background: transparent; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a class="back" href="/">← Back to catalog</a>
      <section class="hero">
        <div class="label">Internal Skill Detail</div>
        <h1 id="title">Skill Overview</h1>
        <div id="summary" class="sub">Loading skill details from local GitLab…</div>
      </section>

      <section class="grid">
        <div class="card">
          <h2>Skill Overview</h2>
          <div id="overview" class="meta"></div>
          <h2 style="margin-top:20px;">Skill Content</h2>
          <article id="readme-html" class="markdown">Loading…</article>
        </div>

        <div class="card" style="display:grid; gap: 16px; align-content:start;">
          <div>
            <h2>Install Command</h2>
            <pre id="install-command" class="command">Loading…</pre>
          </div>
          <div>
            <h2>Audit Evidence</h2>
            <div id="audit-evidence" class="audit-list"></div>
          </div>
        </div>
      </section>

      <section class="card" style="margin-top: 16px;">
        <h2>Version History</h2>
        <div id="versions" class="version-list"></div>
      </section>
    </div>

    <script>
      const skillId = decodeURIComponent(window.location.pathname.split('/').pop());
      const titleEl = document.getElementById('title');
      const summaryEl = document.getElementById('summary');
      const overviewEl = document.getElementById('overview');
      const readmeEl = document.getElementById('readme-html');
      const installCommandEl = document.getElementById('install-command');
      const versionsEl = document.getElementById('versions');
      const auditEvidenceEl = document.getElementById('audit-evidence');

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function formatDate(value) {
        return new Date(value).toLocaleString();
      }

      async function loadDetail() {
        const response = await fetch(`/api/v1/catalog/skills/${encodeURIComponent(skillId)}`);
        const payload = await response.json();
        titleEl.textContent = payload.title;
        summaryEl.textContent = payload.summary;
        overviewEl.innerHTML = [
          `<span>${escapeHtml(payload.category || 'uncategorized')}</span>`,
          `<span>${escapeHtml(payload.risk_level)}</span>`,
          `<span>${escapeHtml(payload.latest_version)}</span>`,
          `<span>${escapeHtml(formatDate(payload.published_at))}</span>`
        ].join('');
        readmeEl.innerHTML = payload.readme_html || '<p>No skill content available.</p>';
        installCommandEl.textContent = payload.install_command;
        versionsEl.innerHTML = payload.versions.map((version) => `
          <div class="version">
            <strong>${escapeHtml(version.version)}</strong>
            <div class="meta">
              <span>${escapeHtml(version.risk_level)}</span>
              <span>${escapeHtml(version.reviewer)}</span>
              <span>${escapeHtml(formatDate(version.published_at))}</span>
            </div>
            <div class="meta">
              <span>${escapeHtml(version.source_url)}</span>
              <span>${escapeHtml(version.package_url)}</span>
            </div>
          </div>
        `).join('');
        auditEvidenceEl.innerHTML = payload.versions.map((version) => `
          <div class="audit">
            <strong>${escapeHtml(version.version)}</strong>
            <div class="meta">
              <span>${escapeHtml(version.reviewer)}</span>
              <span>${escapeHtml(version.note || 'Approved')}</span>
              <span>${escapeHtml(String(version.scan_issue_count))} scan issues</span>
            </div>
          </div>
        `).join('');
      }

      loadDetail().catch((error) => {
        summaryEl.textContent = `Failed to load skill detail: ${String(error)}`;
      });
    </script>
  </body>
</html>
